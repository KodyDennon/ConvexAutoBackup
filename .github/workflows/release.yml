name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

env:
  NODE_VERSION: 26
  IMAGE_NAME: convex-autobackup

jobs:
  native:
    name: Native ${{ matrix.asset }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: linux-x86_64
            archive: tar.gz
          - os: macos-13
            asset: macos-x86_64
            archive: tar.gz
          - os: macos-14
            asset: macos-aarch64
            archive: tar.gz
          - os: windows-latest
            asset: windows-x86_64
            archive: zip
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
      - name: Install web dependencies
        run: npm --prefix web ci
      - name: Build web UI
        run: |
          npm --prefix web run build
          ./scripts/ci/sync-web-dist.sh
      - name: Build binaries
        run: cargo build --release --workspace
      - name: Package Unix bundle
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          bundle="convex-autobackup-${{ matrix.asset }}"
          mkdir -p "dist/$bundle/docs"
          cp target/release/convex-autobackup "dist/$bundle/"
          cp target/release/convex-autobackup-worker "dist/$bundle/"
          cp target/release/convex-autobackup-mcp "dist/$bundle/"
          cp install/install.sh install/docker-setup.sh "dist/$bundle/"
          cp README.md LICENSE SECURITY.md CHANGELOG.md "dist/$bundle/"
          cp -R docs/. "dist/$bundle/docs/"
          tar -C dist -czf "dist/$bundle.tar.gz" "$bundle"
      - name: Package Windows bundle
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $bundle = "convex-autobackup-${{ matrix.asset }}"
          New-Item -ItemType Directory -Force -Path "dist/$bundle/docs" | Out-Null
          Copy-Item target/release/convex-autobackup.exe "dist/$bundle/"
          Copy-Item target/release/convex-autobackup-worker.exe "dist/$bundle/"
          Copy-Item target/release/convex-autobackup-mcp.exe "dist/$bundle/"
          Copy-Item install/install.ps1,install/docker-setup.sh "dist/$bundle/"
          Copy-Item README.md,LICENSE,SECURITY.md,CHANGELOG.md "dist/$bundle/"
          Copy-Item docs/* "dist/$bundle/docs/" -Recurse
          Compress-Archive -Path "dist/$bundle/*" -DestinationPath "dist/$bundle.zip" -Force
      - name: Package Windows MSI
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          dotnet tool install --global wix
          $bundle = "convex-autobackup-${{ matrix.asset }}"
          $msiVersion = "${{ github.ref_name }}" -replace "^v","" -replace "-.*",""
          wix build packaging/wix/ConvexAutoBackup.wxs `
            -d SourceDir="dist/$bundle" `
            -d Version="$msiVersion" `
            -out "dist/$bundle.msi"
      - name: Upload native artifact
        uses: actions/upload-artifact@v7
        with:
          name: convex-autobackup-${{ matrix.asset }}
          path: |
            dist/convex-autobackup-${{ matrix.asset }}.${{ matrix.archive }}
            dist/convex-autobackup-${{ matrix.asset }}.msi
          if-no-files-found: ignore

  docker:
    name: Docker images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ghcr.io/kodydennon/convex-autobackup:${{ github.ref_name }}
            ghcr.io/kodydennon/convex-autobackup:latest
            kodydoty/convex-autobackup:${{ github.ref_name }}
            kodydoty/convex-autobackup:latest

  crates:
    name: crates.io
    runs-on: ubuntu-latest
    needs: native
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - name: Build embedded web UI
        run: |
          npm --prefix web ci
          npm --prefix web run build
          ./scripts/ci/sync-web-dist.sh
      - name: Publish crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          publish_crate() {
            package="$1"
            version="$(cargo metadata --no-deps --format-version 1 | node -e "const fs=require('fs'); const m=JSON.parse(fs.readFileSync(0,'utf8')); const p=m.packages.find((pkg)=>pkg.name===process.argv[1]); process.stdout.write(p.version)" "$package")"
            if cargo search "$package" --limit 1 | grep -q "^$package = \"$version\""; then
              echo "$package $version is already published; skipping"
              return 0
            fi
            for attempt in 1 2 3 4 5; do
              if cargo publish -p "$package" --allow-dirty; then
                return 0
              fi
              echo "Publish failed for $package on attempt $attempt; waiting for registry index"
              sleep 30
            done
            return 1
          }
          publish_crate convex-autobackup-core
          publish_crate convex-autobackup-server
          publish_crate convex-autobackup-worker
          publish_crate convex-autobackup-mcp
          publish_crate convex-autobackup

  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [native, docker, crates]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v7
        with:
          path: release-artifacts
          merge-multiple: true
      - name: Add install scripts and checksums
        run: |
          cp install/install.sh release-artifacts/install.sh
          cp install/install.ps1 release-artifacts/install.ps1
          cp install/docker-setup.sh release-artifacts/docker-setup.sh
          cd release-artifacts
          sha256sum * > SHA256SUMS
      - name: Attest release artifacts
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: release-artifacts/*
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          generate_release_notes: true
          files: release-artifacts/*
