name: Feature Request
description: Propose a capability or workflow improvement.
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What backup, restore, operations, or agent workflow is blocked?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: Describe the behavior, interface, and expected outcome.
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Primary Surface
      options:
        - CLI
        - HTTP API
        - MCP
        - Web UI
        - Worker/Scheduler
        - Storage
        - Restore/DR
        - Packaging
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: What tests or observable behavior would prove this is complete?

