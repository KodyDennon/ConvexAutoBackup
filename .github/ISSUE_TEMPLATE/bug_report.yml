name: Bug Report
description: Report a reproducible defect in ConvexAutoBackup.
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Include enough operational detail for maintainers to reproduce the problem without guessing.
  - type: input
    id: version
    attributes:
      label: Version
      description: Commit SHA, tag, or binary version.
      placeholder: b6b640f or v0.1.0
    validations:
      required: true
  - type: dropdown
    id: install
    attributes:
      label: Install Mode
      options:
        - Native binary
        - Docker
        - Cargo from source
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction Steps
      description: Exact commands, API calls, or UI steps.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Redact deploy keys, object storage credentials, API tokens, and master keys.
      render: shell

